# =============================================================================
# ALEMBIC — Configuración de Migraciones de Esquema (Laika)
# =============================================================================
# Uso:
#   alembic revision --autogenerate -m "descripcion"   → generar migración
#   alembic upgrade head                                → aplicar todas las migraciones
#   alembic downgrade -1                               → revertir última migración
#   alembic current                                    → ver versión actual
#   alembic history                                    → ver historial de migraciones
# =============================================================================

[alembic]
# Carpeta donde viven las migraciones
script_location = alembic

# Formato: YYYY_mm_dd_HHMMss_{rev}_{slug}
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path con este valor para import de src.*
prepend_sys_path = .

# El token %%(rev)s se expande a los primeros 12 caracteres del ID de revisión
truncate_slug_length = 40

# URL de la BD de migraciones (Se sobreescribe en env.py via Settings)
# Placeholder — env.py carga el URL desde settings.psycopg_database_url
sqlalchemy.url = postgresql://placeholder/placeholder

[post_write_hooks]
# Sin hooks de post-escritura (se puede agregar black/isort aquí)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
